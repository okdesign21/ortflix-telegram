[pytest]
testpaths = tests
python_files = *_test.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html
asyncio_mode = auto

[coverage:run]
source = .
omit =
    tests/*
    .venv/*
    venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == '__main__':
    if TYPE_CHECKING:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod
