name: Dependabot auto-approve and merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  approve-and-automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Approve and enable auto-merge
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const mergeable = pr.mergeable;

            // Skip only when there are known conflicts
            if (mergeable === false) {
              core.info('PR has conflicts; skipping approval and auto-merge.');
              return;
            }

            // Approve the PR (satisfies branch protection required review)
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'APPROVE',
              body: 'Auto-approved by Dependabot workflow. Will merge when checks pass.'
            });

            // Enable auto-merge so GitHub merges when required status checks pass
            const mutation = `
              mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: $mergeMethod
                }) {
                  pullRequest { autoMergeRequest { enabledAt } }
                }
              }
            `;
            await github.graphql(mutation, {
              pullRequestId: pr.node_id,
              mergeMethod: 'SQUASH'
            });
            core.info('Auto-merge enabled. PR will merge when required checks pass.');